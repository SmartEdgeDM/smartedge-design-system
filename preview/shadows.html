<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Barlow:wght@600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 18px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items:end; }
  .cell { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 110px; height: 64px; background: #fff; border-radius: 6px; }
  .tag { font-family:"JetBrains Mono"; font-size:11px; color:#3D3D40; }
  .xs { box-shadow: 0 1px 2px rgba(26,26,27,0.06); }
  .sm { box-shadow: 0 2px 6px rgba(26,26,27,0.08); }
  .md { box-shadow: 0 8px 20px rgba(26,26,27,0.10); }
  .lg { box-shadow: 0 18px 40px rgba(26,26,27,0.14); }
</style></head><body>
  <div class="row">
    <div class="cell"><div class="box xs"></div><span class="tag">shadow-xs</span></div>
    <div class="cell"><div class="box sm"></div><span class="tag">shadow-sm</span></div>
    <div class="cell"><div class="box md"></div><span class="tag">shadow-md</span></div>
    <div class="cell"><div class="box lg"></div><span class="tag">shadow-lg</span></div>
  </div>
</body></html>
