<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background:#F9F8F3;}
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); height: 220px; }
  .cell { padding: 14px; display:flex; flex-direction:column; justify-content:space-between; }
  .k { font-family:"Barlow Condensed"; font-size: 10px; letter-spacing:0.18em; text-transform:uppercase; font-weight:700; opacity:0.85; }
  .use { font-weight: 600; font-size: 13px; line-height: 1.35; }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
</style></head><body>
<div class="grid">
  <div class="cell" style="background:#1A1A1B;color:#F9F8F3">
    <div class="k">Almost Black</div>
    <div class="use">Hero bg · Footer · H1 · Body heading</div>
  </div>
  <div class="cell" style="background:#F9F8F3;color:#1A1A1B;border-right:1px solid #E4E3DE;border-left:1px solid #E4E3DE">
    <div class="k">Creamy White</div>
    <div class="use">Page bg · Text-heavy sections</div>
  </div>
  <div class="cell" style="background:#0056B3;color:#F9F8F3">
    <div class="k">Royal Azure</div>
    <div class="use">H2 · H3 · Links · Trust signals</div>
  </div>
  <div class="cell" style="background:#CCFF00;color:#1A1A1B">
    <div class="k">Cyber Lime</div>
    <div class="use">CTAs only · the &ldquo;/&rdquo; · high-impact accent</div>
  </div>
  <div class="cell" style="background:#B19CD9;color:#1A1A1B">
    <div class="k">Light Purple</div>
    <div class="use">Icons · dividers · secondary branding</div>
  </div>
</div>
</body></html>
