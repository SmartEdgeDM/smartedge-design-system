<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Barlow:wght@600;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px; }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .sw { aspect-ratio: 1 / 1.35; border-radius: 4px; padding: 6px; display:flex; flex-direction:column; justify-content:space-between; border: 1px solid rgba(26,26,27,0.08); }
  .step { font-family: "Barlow"; font-weight: 700; font-size: 11px; }
  .hex { font-family: "JetBrains Mono"; font-size: 9px; opacity: 0.7; }
  .label { font-family: "Barlow"; font-weight: 600; font-size: 12px; margin-bottom: 10px; color:#3D3D40; }
</style></head><body>
<div class="label">Neutral ink scale — warm-tinted greys derived from Almost Black + Creamy White</div>
<div class="row">
  <div class="sw" style="background:#1A1A1B;color:#F9F8F3"><span class="step">900</span><span class="hex">1A1A1B</span></div>
  <div class="sw" style="background:#2B2B2D;color:#F9F8F3"><span class="step">800</span><span class="hex">2B2B2D</span></div>
  <div class="sw" style="background:#3D3D40;color:#F9F8F3"><span class="step">700</span><span class="hex">3D3D40</span></div>
  <div class="sw" style="background:#5A5A5E;color:#F9F8F3"><span class="step">600</span><span class="hex">5A5A5E</span></div>
  <div class="sw" style="background:#7A7A7F;color:#F9F8F3"><span class="step">500</span><span class="hex">7A7A7F</span></div>
  <div class="sw" style="background:#A0A0A5;color:#1A1A1B"><span class="step">400</span><span class="hex">A0A0A5</span></div>
  <div class="sw" style="background:#C7C7CB;color:#1A1A1B"><span class="step">300</span><span class="hex">C7C7CB</span></div>
  <div class="sw" style="background:#E4E3DE;color:#1A1A1B"><span class="step">200</span><span class="hex">E4E3DE</span></div>
  <div class="sw" style="background:#EFEDE6;color:#1A1A1B"><span class="step">100</span><span class="hex">EFEDE6</span></div>
  <div class="sw" style="background:#F9F8F3;color:#1A1A1B"><span class="step">50</span><span class="hex">F9F8F3</span></div>
  <div class="sw" style="background:#FFFFFF;color:#1A1A1B"><span class="step">0</span><span class="hex">FFFFFF</span></div>
</div>
</body></html>
