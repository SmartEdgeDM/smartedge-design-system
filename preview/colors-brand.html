<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 6px; overflow: hidden; border: 1px solid rgba(26,26,27,0.08); }
  .chip { height: 88px; display:flex; align-items:flex-end; padding: 10px; }
  .chip .tag { font-family: "Barlow Condensed"; font-weight: 700; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }
  .meta { padding: 8px 10px 10px; background: #fff; }
  .meta .name { font-weight: 700; font-size: 12px; }
  .meta .hex { font-family: "JetBrains Mono"; font-size: 11px; color: #5A5A5E; margin-top: 2px; }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#1A1A1B;color:#F9F8F3"><span class="tag">Almost Black</span></div><div class="meta"><div class="name">se-black</div><div class="hex">#1A1A1B</div></div></div>
  <div class="sw"><div class="chip" style="background:#F9F8F3;color:#1A1A1B;border-bottom:1px solid #E4E3DE"><span class="tag">Creamy White</span></div><div class="meta"><div class="name">se-cream</div><div class="hex">#F9F8F3</div></div></div>
  <div class="sw"><div class="chip" style="background:#0056B3;color:#F9F8F3"><span class="tag">Azure</span></div><div class="meta"><div class="name">se-azure</div><div class="hex">#0056B3</div></div></div>
  <div class="sw"><div class="chip" style="background:#CCFF00;color:#1A1A1B"><span class="tag">Cyber Lime</span></div><div class="meta"><div class="name">se-lime</div><div class="hex">#CCFF00</div></div></div>
  <div class="sw"><div class="chip" style="background:#B19CD9;color:#1A1A1B"><span class="tag">Light Purple</span></div><div class="meta"><div class="name">se-purple</div><div class="hex">#B19CD9</div></div></div>
</div>
</body></html>
