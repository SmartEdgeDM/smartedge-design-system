<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background:#fff; border: 1px solid #E4E3DE; border-radius: 12px; padding: 22px; }
  .ico { width: 36px; height: 36px; display:inline-flex; align-items:center; justify-content:center; background: #F0EBFA; border-radius: 8px; color:#B19CD9; margin-bottom: 14px;}
  h3 { font-family:"Barlow Condensed"; color:#0056B3; margin: 0 0 6px; font-size: 18px; letter-spacing:-0.01em; }
  p { font-family:"Barlow"; color:#3D3D40; margin: 0; font-size: 14px; line-height: 1.5; }
  .card.feat { background:#1A1A1B; border:none; }
  .card.feat h3 { color:#CCFF00; }
  .card.feat p { color:#C7C7CB; }
  .card.feat .ico { background:#2B2B2D; color:#B19CD9; }
</style></head><body>
  <div class="card">
    <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3zM3 9h18M9 21V9"/></svg></div>
    <h3>Brand Systems</h3>
    <p>Identities engineered for clarity across every surface.</p>
  </div>
  <div class="card feat">
    <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/></svg></div>
    <h3>Performance Ads</h3>
    <p>Creative tuned to the metric that matters — ROAS.</p>
  </div>
</body></html>
