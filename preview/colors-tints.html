<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&family=Barlow:wght@600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 16px; }
  .group { margin-bottom: 10px; }
  .g-label { font-weight:700; font-size:11px; letter-spacing: 0.12em; text-transform:uppercase; margin-bottom: 6px; color:#3D3D40; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .sw { height: 42px; border-radius: 4px; padding: 6px 8px; display:flex; justify-content:space-between; align-items:center; border: 1px solid rgba(26,26,27,0.08);}
  .n { font-weight:700; font-size:11px; }
  .h { font-family:"JetBrains Mono"; font-size:10px; opacity:0.65; }
</style></head><body>
<div class="group">
  <div class="g-label">Lime tints</div>
  <div class="row">
    <div class="sw" style="background:#F5FFCC"><span class="n">lime-50</span><span class="h">#F5FFCC</span></div>
    <div class="sw" style="background:#E6FF80"><span class="n">lime-200</span><span class="h">#E6FF80</span></div>
    <div class="sw" style="background:#CCFF00"><span class="n">lime</span><span class="h">#CCFF00</span></div>
    <div class="sw" style="background:#A3CC00;color:#F9F8F3"><span class="n">lime-700</span><span class="h">#A3CC00</span></div>
  </div>
</div>
<div class="group">
  <div class="g-label">Azure tints</div>
  <div class="row">
    <div class="sw" style="background:#E6F0FA"><span class="n">azure-50</span><span class="h">#E6F0FA</span></div>
    <div class="sw" style="background:#BFD6EF"><span class="n">azure-100</span><span class="h">#BFD6EF</span></div>
    <div class="sw" style="background:#0056B3;color:#F9F8F3"><span class="n">azure</span><span class="h">#0056B3</span></div>
    <div class="sw" style="background:#00345F;color:#F9F8F3"><span class="n">azure-900</span><span class="h">#00345F</span></div>
  </div>
</div>
<div class="group">
  <div class="g-label">Purple tints</div>
  <div class="row">
    <div class="sw" style="background:#F0EBFA"><span class="n">purple-50</span><span class="h">#F0EBFA</span></div>
    <div class="sw" style="background:#D6CAEA"><span class="n">purple-200</span><span class="h">#D6CAEA</span></div>
    <div class="sw" style="background:#B19CD9"><span class="n">purple</span><span class="h">#B19CD9</span></div>
    <div class="sw" style="background:#7A63A8;color:#F9F8F3"><span class="n">purple-700</span><span class="h">#7A63A8</span></div>
  </div>
</div>
</body></html>
