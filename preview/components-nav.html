<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background:#1A1A1B; min-height: 100vh; }
  .nav {
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 28px;
    background:#1A1A1B;
    border-bottom: 1px solid #2B2B2D;
    position: relative;
  }
  .brand {
    font-family:"Barlow Condensed"; font-weight:800; font-size: 28px;
    letter-spacing: 0.01em; color:#F9F8F3; text-transform: uppercase;
    white-space: nowrap;
  }
  .brand .s { color:#CCFF00; font-weight:800; padding: 0 0.04em; }

  .links { display:flex; gap: 32px; align-items:center; }
  .link {
    font-family:"Barlow Condensed"; font-weight:700; font-size:14px;
    letter-spacing: 0.16em; text-transform:uppercase;
    color:#F9F8F3; text-decoration:none; padding-bottom: 4px;
    display:inline-flex; align-items:center; gap: 6px;
    white-space: nowrap; position: relative; cursor: pointer;
  }
  .link.active { border-bottom: 2px solid #CCFF00; }
  .link.open   { color: #F9F8F3; }
  .caret { width: 11px; height: 11px; }

  /* Primary CTA */
  .cta {
    font-family:"Barlow Condensed"; font-weight:700; letter-spacing:0.08em;
    text-transform:none; font-size:14px;
    padding: 12px 20px; background:#CCFF00; color:#1A1A1B;
    border: none; border-radius: 4px;
    display:inline-flex; align-items:center; gap: 8px;
    white-space: nowrap; cursor: pointer;
    box-shadow: 0 0 0 0 rgba(204,255,0,0);
    transition: box-shadow 220ms cubic-bezier(.22,1,.36,1);
  }
  .cta:hover { box-shadow: 0 0 0 4px rgba(204,255,0,0.35), 0 0 24px 4px rgba(204,255,0,0.75); }
  .arrow { width: 14px; height: 14px; }

  /* Dropdown */
  .drop {
    position: absolute;
    top: calc(100% - 1px);
    left: 50%;
    transform: translateX(-50%);
    min-width: 220px;
    background: #1A1A1B;
    border: 1px solid #2B2B2D;
    border-radius: 4px;
    padding: 10px;
    display: flex; flex-direction: column; gap: 2px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    z-index: 10;
  }
  .drop a {
    font-family: "Barlow"; font-weight: 500; font-size: 14px;
    color: #F9F8F3; text-decoration: none;
    padding: 10px 14px; border-radius: 3px;
    display: block; white-space: nowrap;
    transition: background 160ms, color 160ms;
  }
  .drop a:hover { background: #2B2B2D; color:#CCFF00; }
  .drop a.active {
    background: #2B2B2D;
    color: #CCFF00;
    box-shadow: inset 2px 0 0 #CCFF00;
  }

  .services-wrap { position: relative; }
</style></head><body>
  <div class="nav">
    <div class="brand">SMART<span class="s">/</span>EDGE</div>
    <div class="links">
      <a class="link active">HOME</a>
      <div class="services-wrap">
        <a class="link open">SERVICES <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M6 9l6 6 6-6"/></svg></a>
        <div class="drop">
          <a class="active">Web Design &amp; Development</a>
          <a>Branding &amp; Logo Design</a>
          <a>SEO Services</a>
          <a>Web Maintenance</a>
        </div>
      </div>
      <a class="link">ABOUT</a>
      <a class="link">WORK</a>
      <a class="link">BLOG</a>
      <a class="link">CONTACT</a>
    </div>
    <button class="cta">Book a Discovery Call
      <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>
</body></html>
