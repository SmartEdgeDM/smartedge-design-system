<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600;700&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 18px; display:flex; gap: 14px; align-items:center; flex-wrap:wrap; }
  .btn { font-family:"Barlow Condensed"; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; font-size:13px; padding: 14px 22px; border: none; cursor: pointer; border-radius: 8px; display:inline-flex; align-items:center; gap: 10px; white-space: nowrap; transition: box-shadow 220ms cubic-bezier(.22,1,.36,1), color 220ms, border-color 220ms, background 220ms; }

  /* Primary: lime fill. Hover removes the hard-offset shadow and adds a lime glow. */
  .btn.primary { background:#CCFF00; color:#1A1A1B; box-shadow: 0 0 0 0 rgba(204,255,0,0); }
  .btn.primary:hover { box-shadow: 0 0 0 4px rgba(204,255,0,0.35), 0 0 24px 4px rgba(204,255,0,0.75); }

  /* Secondary: outline. Hover flips text + border to Cyber Lime. */
  .btn.secondary { background: transparent; color:#1A1A1B; border:2px solid #1A1A1B; }
  .btn.secondary:hover { color:#CCFF00; border-color:#CCFF00; }

  .btn.ghost { background: transparent; color:#0056B3; padding: 10px 14px; border-radius: 4px; }
  .btn.ghost:hover { background: #E6F0FA; }
  .arrow { width: 16px; height: 16px; }
</style></head><body>
  <button class="btn primary">START A PROJECT <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
  <button class="btn secondary">SEE OUR WORK</button>
  <button class="btn ghost">LEARN MORE →</button>
</body></html>
