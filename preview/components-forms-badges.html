<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@500;600&display=swap">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px; display:flex; flex-direction:column; gap: 14px; }
  label { font-family:"Barlow Condensed"; font-weight:600; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color:#3D3D40; display:block; margin-bottom: 6px; }
  input, textarea { font-family:"Barlow"; font-size:15px; width: 100%; padding: 12px 14px; border: 1px solid #C7C7CB; border-radius: 8px; background:#fff; color:#1A1A1B; outline:none; }
  input:focus { border-color:#0056B3; box-shadow: 0 0 0 3px rgba(204,255,0,0.45); }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .badges { display:flex; gap: 6px; flex-wrap:wrap; margin-top: 2px; }
  .b { font-family:"Barlow Condensed"; font-weight:700; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; padding: 5px 10px; border-radius: 999px; }
  .b.lime { background:#CCFF00; color:#1A1A1B; }
  .b.azure { background:#E6F0FA; color:#0056B3; }
  .b.purple { background:#F0EBFA; color:#7A63A8; }
  .b.dark { background:#1A1A1B; color:#F9F8F3; }
</style></head><body>
  <div class="row">
    <div><label>Name</label><input placeholder="Jane Doe"/></div>
    <div><label>Email</label><input placeholder="jane@company.com" style="border-color:#0056B3; box-shadow:0 0 0 3px rgba(204,255,0,0.45)"/></div>
  </div>
  <div class="badges">
    <span class="b lime">NEW</span>
    <span class="b azure">CASE STUDY</span>
    <span class="b purple">SERVICES</span>
    <span class="b dark">SHIPPED</span>
  </div>
</body></html>
